<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezerwacja Kortu - Triton Country</title>
    <link rel="stylesheet" href="style.css?v=301">
</head>
<body>
    <div class="container">
        <header style="text-align: center; margin-bottom: 20px;">
            <h1>Rezerwacja Kortu</h1>
            <p>Mieszkańcy Triton Country</p>
        </header>

        <div id="calendar" class="calendar-grid">
            </div>

        <button id="reserveBtn" class="primary-btn" style="display: none;">Zarezerwuj wybrane terminy</button>
    </div>

    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <h2>Dane rezerwacji</h2>
            <div class="form-group">
                <label>Imię</label>
                <input type="text" id="inputFirstName" placeholder="np. Zbyszek">
            </div>
            <div class="form-group">
                <label>Ulica i nr domu</label>
                <input type="text" id="inputAddress" placeholder="np. Słowika 61">
            </div>
            <div class="form-group">
                <label>PIN (4 cyfry do odwołania)</label>
                <input type="number" id="inputPin">
            </div>
            <div class="modal-actions">
                <button id="cancelModalBtn" class="secondary-btn">Anuluj</button>
                <button id="confirmBookingBtn" class="primary-btn" style="width: auto; margin: 0;">Potwierdź</button>
            </div>
        </div>
    </div>

    <div id="successModal" class="modal">
        <div class="modal-content" style="text-align: center;">
            <h2>Zarezerwowano!</h2>
            <p>Twój PIN to:</p>
            <h1 id="successPin" style="color: #0366d6; margin: 15px 0;"></h1>
            <button id="closeSuccessBtn" class="secondary-btn">Zamknij</button>
        </div>
    </div>

    <script type="module" src="app.js?v=301"></script>
</body>
</html>
