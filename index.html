<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kort Tenisowy - Triton Country</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" href="apple-touch-icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header style="text-align: center; margin-bottom: 20px;">
            <h1>Rezerwacja Kortu</h1>
            <p>Mieszkańcy Triton Country</p>
            <button id="openBoardBtn" class="partner-btn">🎾 Znajdź partnera do gry</button>
        </header>

        <div id="calendar" class="calendar-grid"></div>
        <button id="reserveBtn" class="primary-btn" style="display: none;">Zarezerwuj wybrane terminy</button>
    </div>

    <div id="partnerBoard" class="board-overlay">
        <div class="board-content">
            <button id="closeBoardBtn" class="close-x">&times;</button>
            <div class="board-header">
                <h2>Giełda Graczy</h2>
                <p style="font-size: 0.85rem; color: #64748b; margin-bottom: 15px;">Szukasz kogoś do sparingu? Dodaj się tutaj.</p>
            </div>
            <button id="addPostBtn" class="add-post-btn">+ Dodaj swoje ogłoszenie</button>
            <div id="postsList" class="posts-container"></div>
        </div>
    </div>

    <div id="postModal" class="modal">
        <div class="modal-content">
            <button class="close-x" id="cancelPostBtn">&times;</button>
            <h2>Szukam partnera</h2>
            <div class="form-group" style="margin-top: 15px;">
                <label>Imię</label>
                <input type="text" id="postName" placeholder="np. Tomek">
            </div>
            <div class="form-group">
                <label>Ulica i nr domu</label>
                <input type="text" id="postAddress" placeholder="np. Słowika 15">
            </div>
            <div class="form-group">
                <label>Poziom gry</label>
                <select id="postLevel" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0;">
                    <option value="Początkujący">🟢 Początkujący</option>
                    <option value="Średniozaawansowany" selected>🟡 Średniozaawansowany</option>
                    <option value="Zaawansowany">🔴 Zaawansowany / Pro</option>
                </select>
            </div>
            <div class="form-group">
                <label>Kiedy / Dostępność</label>
                <input type="text" id="postAvailability" placeholder="np. Pon-Pt po 17:00, weekendy">
            </div>
            <div class="form-group">
                <label>Kontakt (tel / whatsapp)</label>
                <input type="text" id="postContact" placeholder="np. 500 600 700">
            </div>
            <div class="form-group">
                <label>Twój PIN (do usunięcia ogłoszenia)</label>
                <input type="number" id="postPin" placeholder="4 cyfry">
            </div>
            <button id="savePostBtn" class="confirm-btn" style="width: 100%;">Opublikuj ogłoszenie</button>
        </div>
    </div>

    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <button class="close-x cancel-modal-btn">&times;</button>
            <h2 id="modalTitle">Dane rezerwacji</h2>
            <div class="form-group">
                <label>Imię (Wpisz kod trenera dla trybu zajęć)</label>
                <input type="text" id="inputFirstName" placeholder="Twoje imię">
            </div>
            
            <div id="workshopFields" style="display: none; background: #f0f7ff; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #dbeafe;">
                <label style="color: #0056b3; font-weight: 800; display: block; margin-bottom: 10px;">✨ USTAWIENIA SZKOLENIA</label>
                <div class="form-group">
                    <label>Imię Trenera</label>
                    <input type="text" id="inputCoachDisplayName" placeholder="np. Maciek">
                </div>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <div class="form-group" style="flex: 1;"><label>Miejsca</label><input type="number" id="inputMaxSpots" value="4"></div>
                    <div class="form-group" style="flex: 1;"><label>Wpłata (zł)</label><input type="number" id="inputDonation" placeholder="np. 20"></div>
                </div>
                <div class="form-group">
                    <label>BLIK (telefon)</label>
                    <input type="text" id="inputBlik" placeholder="Numer do wpłat">
                </div>
                <div class="form-group">
                    <label>Notatka dla rodziców</label>
                    <input type="text" id="inputCoachNote" placeholder="np. Zbiórka przed kortem">
                </div>
            </div>

            <div class="form-group">
                <label id="labelAddress">Ulica i nr domu / Opis</label>
                <input type="text" id="inputAddress" placeholder="np. Słowika 24">
            </div>
            <div class="form-group">
                <label>PIN (4 cyfry)</label>
                <input type="number" id="inputPin">
            </div>
            <button id="confirmBookingBtn" class="confirm-btn" style="width: 100%;">Zatwierdź rezerwację</button>
        </div>
    </div>

    <div id="joinWorkshopModal" class="modal">
        <div class="modal-content" style="max-width: 480px;">
            <button id="cancelJoinBtn" class="close-x">&times;</button>
            <div class="board-header">
                <h2 style="font-size: 1.4rem; margin: 0;">Szkolenie Tenisowe</h2>
                <button id="coachDashboardBtn" class="coach-link-btn">Trener ...</button>
            </div>
            <div id="workshopDescriptionBox" class="info-box-blue"><p id="workshopDescriptionText" style="font-weight: 700; color: #1e3a8a; margin: 0;"></p></div>
            <div id="coachNoteBox" class="info-box-yellow" style="display: none;"><p id="coachNoteText" style="font-size: 0.9rem; margin: 0; color: #856404; font-weight: 600; white-space: pre-wrap;"></p></div>
            <div id="donationBox" class="info-box-green">
                <p style="font-size: 0.8rem; margin: 0;">Sugerowana wpłata: <strong id="donationValue">0 zł</strong></p>
                <p style="font-size: 0.85rem; margin-top: 4px; font-weight: 700;">BLIK: <span id="blikValue">---</span></p>
            </div>
            <div id="participantsSection" style="margin-bottom: 20px;">
                <label style="font-weight: 800; font-size: 0.75rem; text-transform: uppercase; color: #94a3b8; display: block; margin-bottom: 8px;">Uczestnicy (Wolne: <span id="spotsLeftCount"></span>):</label>
                <div id="participantsList" class="p-list-container"></div>
            </div>
            <div id="joinForm">
                <div class="form-group"><input type="text" id="joinName" placeholder="Imię dziecka"></div>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="number" id="joinAge" placeholder="Wiek" style="flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0;">
                    <input type="text" id="joinAddress" placeholder="Nr domu" style="flex: 2; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0;">
                </div>
                <div class="form-group"><input type="number" id="joinPin" placeholder="PIN (4 cyfry do ew. wypisania)"></div>
                <button id="confirmJoinBtn" class="confirm-btn" style="width: 100%;">Zapisz dziecko i dodaj do kalendarza</button>
            </div>
        </div>
    </div>

    <div id="coachDashboardModal" class="modal">
        <div class="modal-content" style="border: 2px solid #1a2a47;">
            <button class="close-x" id="closeCoachDashBtn">&times;</button>
            <h2 style="color: #1a2a47;">Panel Trenera</h2>
            <div class="form-group" style="margin-top: 15px;">
                <label>Edytuj notatkę dla rodziców</label>
                <textarea id="editCoachNote" style="width: 100%; height: 100px; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; font-family: inherit;"></textarea>
            </div>
            <button id="saveNoteBtn" class="confirm-btn" style="width: 100%; background: #3b82f6;">Zatwierdź zmiany</button>
            <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
                <button id="coachCancelFullBtn" class="secondary-btn" style="width: 100%; color: #ef4444; background: #fee2e2;">Anuluj całe szkolenie</button>
            </div>
        </div>
    </div>

    <div id="successModal" class="modal">
        <div class="modal-content" style="text-align: center;">
            <button class="close-x" id="closeSuccessBtn">&times;</button>
            <h2 id="successTitle" style="color: #059669;">Sukces!</h2>
            <p id="successPin" style="color: #1a2a47; margin: 15px 0; font-size: 3rem;"></p>
            <div style="border-top: 1px solid #eee; padding-top: 15px;">
                <p style="font-size: 0.9rem; margin-bottom: 12px; font-weight: 700;">📅 Dodaj do kalendarza:</p>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <a id="googleCalBtn" target="_blank" class="calendar-link-btn" style="background: #4285F4; color: white; text-decoration: none; padding: 12px; border-radius: 12px; font-weight: 700;">Google Calendar</a>
                    <button id="icsCalBtn" style="background: #34a853; color: white; padding: 12px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer;">Apple / Outlook</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
